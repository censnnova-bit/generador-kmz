<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador KMZ Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .formulario {
            background-color: #fff;
            padding: 20px;
            margin: 30px auto;
            border-radius: 8px;
            max-width: 600px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .checkbox-group {
            margin-top: 10px;
        }
        .checkbox-group label {
            font-weight: normal;
            display: block;
        }
        .color-picker {
            margin-top: 10px;
        }
        .separador {
            height: 2px;
            background-color: #ccc;
            margin: 40px 0;
        }
    </style>
</head>
<body>
    <h2>Generador de KMZ</h2>

    <div class="formulario">
        <h3>KMZ / PDF por Transformador</h3>
        <form method="GET" action="/generar_kmz/">
            <label for="regional">Regional:</label>
            <select name="regional" id="regional" required>
                <option value="">Seleccione una regional</option>
                <option value="CUCUTA">CUCUTA</option>
                <option value="AGUACHICA">AGUACHICA</option>
                <option value="PAMPLONA">PAMPLONA</option>
                <option value="TIBU">TIBU</option>
                <option value="OCAÑA">OCAÑA</option>
            </select>

            <label for="circuito">Circuito:</label>
            <select name="circuito" id="circuito" required>
                <option value="">Seleccione un circuito</option>
            </select>

            <label for="codigo_trafo">Código Trafo:</label>
            <select name="codigo_trafo" id="codigo_trafo" required>
                <option value="">Seleccione un trafo</option>
            </select>

            <div class="color-picker">
                <label for="color_red_bt">Color RED_BT:</label>
                <input type="color" id="color_red_bt" name="color_red_bt" value="#ff0000">
            </div>

            <button type="submit">Generar KMZ por Trafo</button>
        </form>

        <!-- Nuevo formulario solo para PDF -->
        <form method="GET" action="/generar_pdf_trafo/" style="margin-top:15px;">
            <input type="hidden" name="regional" id="pdf_regional">
            <input type="hidden" name="circuito" id="pdf_circuito">
            <input type="hidden" name="codigo_trafo" id="pdf_codigo_trafo">
            <button type="submit">Generar PDF por Trafo (A3)</button>
        </form>
    </div>

    <div class="separador"></div>

    <div class="formulario">
        <h3>KMZ por Circuito Total</h3>
        <form method="GET" action="/generar_kmz_total/">
            <label for="regional_total">Regional:</label>
            <select name="regional" id="regional_total" required>
                <option value="">Seleccione una regional</option>
                <option value="CUCUTA">CUCUTA</option>
                <option value="AGUACHICA">AGUACHICA</option>
                <option value="PAMPLONA">PAMPLONA</option>
                <option value="TIBU">TIBU</option>
                <option value="OCAÑA">OCAÑA</option>
            </select>

            <label for="circuito_total">Circuito:</label>
            <select name="circuito" id="circuito_total" required>
                <option value="">Seleccione un circuito</option>
            </select>

            <label for="nombre_kmz">Nombre del archivo KMZ:</label>
            <input type="text" name="nombre_kmz" id="nombre_kmz" required>

            <div class="checkbox-group">
                <label><input type="checkbox" name="entidades" value="AISLADEROS"> AISLADEROS</label>
                <label><input type="checkbox" name="entidades" value="CUCHILLAS"> CUCHILLAS</label>
                <label><input type="checkbox" name="entidades" value="RECONECTADORES"> RECONECTADORES</label>
                <label><input type="checkbox" name="entidades" value="TRAFOS"> TRAFOS</label>
                <label><input type="checkbox" name="entidades" value="POSTES_MT"> POSTES_MT</label>
                <label><input type="checkbox" name="entidades" value="POSTES_BT"> POSTES_BT</label>
                <label><input type="checkbox" name="entidades" value="RED_MT"> RED_MT</label>
                <label><input type="checkbox" name="entidades" value="RED_BT"> RED_BT</label>
            </div>

            <div class="color-picker">
                <label for="color_red_mt">Color RED_MT:</label>
                <input type="color" id="color_red_mt" name="color_red_mt" value="#ff0000">
                <label for="color_red_bt2">Color RED_BT:</label>
                <input type="color" id="color_red_bt2" name="color_red_bt" value="#ff0000">
            </div>

            <button type="submit">Generar KMZ por Circuito Total</button>
        </form>
    </div>

    <script>
        function cargarCircuitos(selectRegionalId, selectCircuitoId) {
            const regional = document.getElementById(selectRegionalId).value;
            const circuitoSelect = document.getElementById(selectCircuitoId);
            circuitoSelect.innerHTML = '<option value="">Cargando...</option>';

            fetch(`/api/circuitos/?regional=${regional}`)
                .then(response => response.json())
                .then(data => {
                    circuitoSelect.innerHTML = '<option value="">Seleccione un circuito</option>';
                    data.circuitos.forEach(c => {
                        const option = document.createElement('option');
                        option.value = c;
                        option.textContent = c;
                        circuitoSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    circuitoSelect.innerHTML = '<option value="">Error al cargar</option>';
                    console.error("Error cargando circuitos:", error);
                });
        }

        function cargarTrafos() {
            const regional = document.getElementById("regional").value;
            const circuito = document.getElementById("circuito").value;
            const trafoSelect = document.getElementById("codigo_trafo");
            trafoSelect.innerHTML = '<option value="">Cargando...</option>';

            fetch(`/api/trafos/?regional=${regional}&circuito=${circuito}`)
                .then(response => response.json())
                .then(data => {
                    trafoSelect.innerHTML = '<option value="">Seleccione un trafo</option>';
                    data.trafos.forEach(t => {
                        const option = document.createElement('option');
                        option.value = t;
                        option.textContent = t;
                        trafoSelect.appendChild(option);
                    });
                    syncTrafoForm(); // sincronizar al cargar
                })
                .catch(error => {
                    trafoSelect.innerHTML = '<option value="">Error al cargar</option>';
                    console.error("Error cargando trafos:", error);
                });
        }

        function syncTrafoForm() {
            document.getElementById("pdf_regional").value = document.getElementById("regional").value;
            document.getElementById("pdf_circuito").value = document.getElementById("circuito").value;
            document.getElementById("pdf_codigo_trafo").value = document.getElementById("codigo_trafo").value;
        }

        document.getElementById("regional").addEventListener("change", () => {
            cargarCircuitos("regional", "circuito");
            syncTrafoForm();
        });

        document.getElementById("circuito").addEventListener("change", () => {
            cargarTrafos();
            syncTrafoForm();
        });

        document.getElementById("codigo_trafo").addEventListener("change", syncTrafoForm);

        document.getElementById("regional_total").addEventListener("change", () => {
            cargarCircuitos("regional_total", "circuito_total");
        });
    </script>
</body>
</html>
